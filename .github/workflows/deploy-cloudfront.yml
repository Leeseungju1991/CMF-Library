# -----------------------------------------------------------------------------
# deploy-cloudfront.yml — CMF Library (Vite SPA) 를 S3 + CloudFront 로 배포.
#
# Firebase Hosting(firebase-hosting.yml) 과 병행하는 CloudFront 배포 경로.
# 배포 대상: https://d11zdg3ax3cxya.cloudfront.net
#
# 필요 repository VARIABLES:
#   AWS_DEPLOY_ROLE_ARN          arn:aws:iam::<account>:role/<deploy-role>
#   AWS_REGION                   ap-northeast-2
#   S3_BUCKET                    CMF CloudFront 오리진 S3 버킷명
#   CLOUDFRONT_DISTRIBUTION_ID   d11zdg3ax3cxya 배포의 distribution id
#
# 필요 repository SECRETS (빌드 시 주입 — firebase-hosting.yml 과 동일):
#   VITE_FIREBASE_API_KEY / VITE_FIREBASE_AUTH_DOMAIN / VITE_FIREBASE_PROJECT_ID /
#   VITE_FIREBASE_STORAGE_BUCKET / VITE_FIREBASE_MESSAGING_SENDER_ID /
#   VITE_FIREBASE_APP_ID / VITE_FIREBASE_MEASUREMENT_ID
#
# 트리거: 수동 dispatch 전용.
# -----------------------------------------------------------------------------
name: deploy-cloudfront

on:
  workflow_dispatch:

concurrency:
  group: deploy-cmf-cloudfront-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || '' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || '' }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3 + CloudFront
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: bash scripts/deploy-cloudfront.sh
